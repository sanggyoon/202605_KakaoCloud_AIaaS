# 4K Cinema — AWS Burst/DR 워밍스탠바이 앱 스택 (EC2 Private Subnet)
#
# 구성: frontend(Next.js) + backend(FastAPI). 카카오 K3s와 동일한 GHCR 이미지를 사용.
# - ALB 타깃 = frontend:3000 (공개 진입점). backend는 컴포즈 내부망에서만 접근(미공개).
# - 브라우저 → frontend → /api/manager 프록시 → backend.
# - 브라우저 → data.peakly.art (Supabase REST) 는 FE 이미지에 baked. Route53가 대상 스윙.
# - DB 레플리카(PostgREST) 는 별도 EC2(Step 5). 여기선 앱 티어만 다룬다.
#
# 사전: docker, docker compose, 그리고 GHCR private pull 시 `docker login ghcr.io`.
# 실행: cp .env.example .env && 값 채우기 → docker compose up -d
name: peakly-dr

services:
  backend:
    image: ghcr.io/sanggyoon/4k-be:latest   # 안정 운영 시 :<sha7> 로 핀 권장
    container_name: peakly-backend
    restart: unless-stopped
    pull_policy: always
    # 외부 미공개 — frontend 컨테이너에서 http://backend:8000 으로만 접근
    expose:
      - "8000"
    env_file:
      - .env
    healthcheck:
      # python:slim 이미지엔 curl/wget이 없어 urllib 사용
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/sanggyoon/4k-fe:latest    # 안정 운영 시 :<sha7> 로 핀 권장
    container_name: peakly-frontend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3000:3000"                          # ALB Target Group → 이 포트
    env_file:
      - .env
    environment:
      # 컴포즈 내부 DNS로 backend 컨테이너를 가리킴 (.env 값보다 우선)
      BE_INTERNAL_URL: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # node:22-alpine 의 busybox wget 사용
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
