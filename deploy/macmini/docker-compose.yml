# 맥미니 앱 오버레이 — 기존 nginx-proxy + acme-companion(자동 TLS)을 그대로 사용.
# 공식 Supabase compose와 같은 프로젝트로 병합 실행:
#   docker compose --env-file .env -f supabase/docker-compose.yml -f docker-compose.yml up -d
# nginx-proxy는 VIRTUAL_HOST/LETSENCRYPT_HOST 라벨로 자동 라우팅·인증서 발급(네트워크 'proxy').
# 내부 통신(backend↔kong↔db↔rest)은 프로젝트 default 네트워크.
name: peakly

networks:
  default:
  proxy:
    external: true
    name: proxy

services:
  # Supabase PostgREST에 public/ai 스키마 노출(기본=public). data=public, ai=ai 스키마.
  rest:
    environment:
      PGRST_DB_SCHEMAS: "public, ai"

  # Supabase 게이트웨이를 nginx-proxy로 공개(브라우저 → peakly-data.sanggyoon.com)
  kong:
    networks: [default, proxy]
    environment:
      VIRTUAL_HOST: "${DATA_DOMAIN}"
      VIRTUAL_PORT: "8000"
      LETSENCRYPT_HOST: "${DATA_DOMAIN}"

  backend:
    build:
      context: ../../4K_BE
    container_name: peakly-backend
    restart: unless-stopped
    environment:
      DATA_SUPABASE_URL: "http://kong:8000"
      AI_DATABASE_URL: "http://kong:8000"
      DATA_SUPABASE_KEY: "${SERVICE_ROLE_KEY}"
      AI_DATABASE_KEY: "${SERVICE_ROLE_KEY}"
      AI_SCHEMA: "${AI_SCHEMA}"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      MANAGER_ID: "${MANAGER_ID}"
      MANAGER_PASSWORD: "${MANAGER_PASSWORD}"
      MANAGER_SESSION_SECRET: "${MANAGER_SESSION_SECRET}"
    depends_on:
      - kong
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../../4K_FE
      args:
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
    container_name: peakly-frontend
    restart: unless-stopped
    networks: [default, proxy]
    environment:
      BE_INTERNAL_URL: "http://backend:8000"
      AI_DATABASE_URL: "http://kong:8000"
      AI_DATABASE_KEY: "${SERVICE_ROLE_KEY}"
      AI_SCHEMA: "${AI_SCHEMA}"
      MANAGER_ID: "${MANAGER_ID}"
      MANAGER_PASSWORD: "${MANAGER_PASSWORD}"
      MANAGER_SESSION_SECRET: "${MANAGER_SESSION_SECRET}"
      VIRTUAL_HOST: "${FE_DOMAIN}"
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: "${FE_DOMAIN}"
    depends_on:
      - backend

  understand:
    build:
      context: ../../understand-dashboard
    container_name: peakly-understand
    restart: unless-stopped
    networks: [default, proxy]
    environment:
      VIRTUAL_HOST: "${UNDERSTAND_DOMAIN}"
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: "${UNDERSTAND_DOMAIN}"
