apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fe
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: frontend
          image: ghcr.io/sanggyoon/4k-fe:latest
          env:
            - name: BE_INTERNAL_URL
              value: 'http://backend.be.svc.cluster.local:8000'
            # 매니저 자격증명/세션 시크릿 — frontend-secrets에서 주입(평문 금지).
            # 1회 설정/회전:
            #   kubectl -n fe create secret generic frontend-secrets \
            #     --from-literal=MANAGER_ID='<id>' \
            #     --from-literal=MANAGER_PASSWORD='<강력 비밀번호>' \
            #     --from-literal=MANAGER_SESSION_SECRET="$(openssl rand -hex 32)" \
            #     --from-literal=ai-database-key='<vm5 key>' --dry-run=client -o yaml | kubectl apply -f -
            - name: MANAGER_ID
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: MANAGER_ID
            - name: MANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: MANAGER_PASSWORD
            - name: MANAGER_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: MANAGER_SESSION_SECRET
            # vm5(AI DB) 접속 — 외부 점수 API(/api/movies/[tmdb_id]/scores)용.
            # URL은 공개값, KEY는 클러스터 Secret(frontend-secrets)에서 주입.
            # 적용 전 1회: kubectl -n fe create secret generic frontend-secrets \
            #   --from-literal=ai-database-key='<vm5 PostgREST key>'
            - name: AI_DATABASE_URL
              value: 'https://ai.peakly.art'
            - name: AI_DATABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: ai-database-key
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 300m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
