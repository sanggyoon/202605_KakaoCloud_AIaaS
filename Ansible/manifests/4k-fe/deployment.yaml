apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: frontend
          image: ghcr.io/sanggyoon/4k-fe:latest
          env:
            - name: BE_INTERNAL_URL
              value: 'http://backend.be.svc.cluster.local:8000'
            # 매니저 페이지 로그인 자격증명 — 값만 바꾸면 ID/비밀번호 변경 가능
            - name: MANAGER_ID
              value: 'admin'
            - name: MANAGER_PASSWORD
              value: 'admin'
            # 세션 서명 시크릿 — 운영에서는 Secret으로 분리 권장 (openssl rand -hex 32)
            - name: MANAGER_SESSION_SECRET
              value: '7e21bb198957970f12bccb5584b4a2ef8a409a2971357f51af7073c6620b402a'
            # vm5(AI DB) 접속 — 외부 점수 API(/api/movies/[tmdb_id]/scores)용.
            # URL은 공개값, KEY는 클러스터 Secret(frontend-secrets)에서 주입.
            # 적용 전 1회: kubectl -n fe create secret generic frontend-secrets \
            #   --from-literal=ai-database-key='<vm5 PostgREST key>'
            - name: AI_DATABASE_URL
              value: 'https://ai.peakly.art'
            - name: AI_DATABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: ai-database-key
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
