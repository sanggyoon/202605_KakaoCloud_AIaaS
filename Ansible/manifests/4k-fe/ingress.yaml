apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: fe
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    # 전환 완료 후 제거 (구 도메인)
    - hosts:
        - cinema.4kakao.kro.kr
      secretName: frontend-tls
    # 신규 도메인 — apex + www. 별도 secret으로 분리해 기존 인증서에 영향 없음
    - hosts:
        - peakly.art
        - www.peakly.art
      secretName: frontend-peakly-tls
  rules:
    # 전환 완료 후 제거 (구 도메인)
    - host: cinema.4kakao.kro.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: peakly.art
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: www.peakly.art
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
