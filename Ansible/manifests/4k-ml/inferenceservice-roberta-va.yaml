# roberta-va 서빙 — KServe RawDeployment, CPU, ml-models PVC를 /mnt/models로 직접 마운트.
# (custom 컨테이너라 storageUri 대신 PVC 볼륨 직접 마운트가 단순/확실.)
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: roberta-va
  namespace: ai
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    nodeSelector:
      workload: gpu          # ml-models PVC가 vm5(local-path)라 vm5 고정. GPU는 요청 안 함.
    containers:
      - name: kserve-container
        image: ghcr.io/sanggyoon/4k-ml:19789fc
        command: ["python", "-m", "serving.serve"]   # FastAPI(uvicorn) :8080, KServe V1 프로토콜
        ports:
          - containerPort: 8080
            protocol: TCP
        env:
          - name: MODEL_DIR
            value: /mnt/models
          - name: OMP_NUM_THREADS      # torch CPU 추론 스레드 = 코어 수에 맞춤(속도↑)
            value: "6"
          - name: MKL_NUM_THREADS
            value: "6"
        envFrom:
          - secretRef:
              name: 4k-ml-secrets
        volumeMounts:
          - name: models
            mountPath: /mnt/models
            subPath: roberta-va-v1
        readinessProbe:
          httpGet:
            path: /v1/models/roberta-va
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 12
        resources:
          requests:
            cpu: "2"
            memory: 2Gi
          limits:
            cpu: "6"
            memory: 6Gi
    volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ml-models
