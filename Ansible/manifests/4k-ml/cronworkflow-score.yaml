# P1 자동화 — 하루 1회 스코어(활성버전 점수 빠진 영화 결산). 겹침 금지.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: score-hourly
  namespace: ai
spec:
  schedules:
    - "0 21 * * *"   # 하루 1회 (UTC 21:00 = KST 06:00, 파싱 1시간 뒤)
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    workflowTemplateRef:
      name: score-scenes
