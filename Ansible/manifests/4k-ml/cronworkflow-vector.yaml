# P1 자동화 — 하루 1회 벡터(활성 점수 있는데 활성벡터 없는 영화 증분). 겹침 금지.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: vector-hourly
  namespace: ai
spec:
  schedules:
    - "0 22 * * *"   # 하루 1회 (UTC 22:00 = KST 07:00, 스코어 1시간 뒤)
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    workflowTemplateRef:
      name: generate-vectors
