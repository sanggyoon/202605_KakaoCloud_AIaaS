# P1 자동화 — 하루 1회 파싱(subtitle done & parse 미완). 겹침 금지.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: parse-hourly
  namespace: ai
spec:
  schedules:
    - "0 20 * * *"   # 하루 1회 (UTC 20:00 = KST 05:00, 자막수집 19:00 다음)
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    workflowTemplateRef:
      name: subtitle-parse
