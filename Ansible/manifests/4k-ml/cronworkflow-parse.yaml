# P1 자동화 — 매시 :05 파싱(subtitle done & parse 미완). 겹침 금지.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: parse-hourly
  namespace: ai
spec:
  schedules:
    - "5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    workflowTemplateRef:
      name: subtitle-parse
