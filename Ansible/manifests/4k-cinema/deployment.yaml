apiVersion: apps/v1
kind: Deployment
metadata:
  name: 4k-cinema
  namespace: fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 4k-cinema
  template:
    metadata:
      labels:
        app: 4k-cinema
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: 4k-cinema
          image: ghcr.io/sanggyoon/4k-cinema:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
