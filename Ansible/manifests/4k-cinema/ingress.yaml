apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 4k-cinema
  namespace: fe
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cinema.4kakao.kro.kr
      secretName: 4k-cinema-tls
  rules:
    - host: cinema.4kakao.kro.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: 4k-cinema
                port:
                  number: 80
