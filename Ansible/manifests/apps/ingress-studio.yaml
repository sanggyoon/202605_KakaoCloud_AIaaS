---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supabase-data-studio
  namespace: data
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: supabase-dashboard-basic
    nginx.ingress.kubernetes.io/auth-realm: 'Supabase Data'
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - data.4kakao.kro.kr
      secretName: data-supabase-tls
  rules:
    - host: data.4kakao.kro.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-studio
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supabase-ai-studio
  namespace: ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/auth-type: basic
