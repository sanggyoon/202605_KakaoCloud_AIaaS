---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supabase-data-studio
  namespace: data
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: supabase-dashboard-basic
    nginx.ingress.kubernetes.io/auth-realm: 'Supabase Data'
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - data.4kakao.kro.kr   # 전환 후 제거
      secretName: data-supabase-tls
    - hosts:
        - data.peakly.art
      secretName: data-supabase-peakly-tls
  rules:
    - host: data.4kakao.kro.kr   # 전환 후 제거
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-studio
                port:
                  number: 3000
    - host: data.peakly.art
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-studio
                port:
                  number: 3000
---
# data Supabase REST API (Kong) — Basic Auth 없음, Supabase JWT로 인증
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supabase-data-api
  namespace: data
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - data.4kakao.kro.kr   # 전환 후 제거
      secretName: data-supabase-tls
    - hosts:
        - data.peakly.art
      secretName: data-supabase-peakly-tls
  rules:
    - host: data.4kakao.kro.kr   # 전환 후 제거
      http:
        paths:
          - path: /rest/v1
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-kong
                port:
                  number: 8000
          - path: /auth/v1
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-kong
                port:
                  number: 8000
          - path: /storage/v1
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-kong
                port:
                  number: 8000
    - host: data.peakly.art
      http:
        paths:
          - path: /rest/v1
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-kong
                port:
                  number: 8000
          - path: /auth/v1
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-kong
                port:
                  number: 8000
          - path: /storage/v1
            pathType: Prefix
            backend:
              service:
                name: supabase-data-supabase-kong
                port:
                  number: 8000
---
