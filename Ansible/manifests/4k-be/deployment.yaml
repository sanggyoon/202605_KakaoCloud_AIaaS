apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: be
spec:
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: backend
          image: ghcr.io/sanggyoon/4k-be:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: 4k-be-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
