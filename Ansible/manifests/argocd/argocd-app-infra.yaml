apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sanggyoon/202605_KakaoCloud_AIaaS.git
    targetRevision: main
    path: Ansible/manifests/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
