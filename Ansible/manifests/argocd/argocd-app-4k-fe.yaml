apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 4k-fe
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sanggyoon/202605_KakaoCloud_AIaaS.git
    targetRevision: main
    path: Ansible/manifests/4k-fe
  destination:
    server: https://kubernetes.default.svc
    namespace: fe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
