---
- name: Install K3s server on master
  hosts: masters
  become: yes
  vars:
    k3s_version: 'v1.30.5+k3s1'
  tasks:
    - name: Install K3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        INSTALL_K3S_EXEC="server \
          --disable traefik \
          --write-kubeconfig-mode 644 \
          --tls-san 210.109.83.10 \
          --tls-san 10.1.1.10 \
          --node-name {{ inventory_hostname }} \
          --advertise-address {{ ansible_host }} \
          --node-ip {{ ansible_host }}" \
        sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node-token
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Read node-token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Save token to local
      ansible.builtin.copy:
        content: '{{ node_token.content | b64decode | trim }}'
        dest: '{{ playbook_dir }}/../k3s_node_token'
      delegate_to: localhost
      become: no

    - name: Save kubeconfig to local
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: '{{ playbook_dir }}/../kubeconfig'
        flat: yes

    - name: Patch kubeconfig server address
      ansible.builtin.replace:
        path: '{{ playbook_dir }}/../kubeconfig'
        regexp: '127\.0\.0\.1'
        replace: '210.109.83.10'
      delegate_to: localhost
      become: no
