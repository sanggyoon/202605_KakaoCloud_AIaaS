---
- name: Install K3s agent on workers
  hosts: workers:gpu
  become: yes
  vars:
    k3s_version: 'v1.30.5+k3s1'
    k3s_server_url: 'https://10.1.1.10:6443'
    k3s_token_file: '{{ playbook_dir }}/../k3s_node_token'
  tasks:
    - name: Read node-token from local
      ansible.builtin.set_fact:
        k3s_token: "{{ lookup('file', k3s_token_file) }}"

    - name: Install K3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        K3S_URL={{ k3s_server_url }} \
        K3S_TOKEN={{ k3s_token }} \
        INSTALL_K3S_EXEC="agent \
          --node-name {{ inventory_hostname }} \
          --node-ip {{ ansible_host }}" \
        sh -
      args:
        creates: /usr/local/bin/k3s-agent

    - name: Wait for k3s-agent service
      ansible.builtin.systemd:
        name: k3s-agent
        state: started
        enabled: yes
