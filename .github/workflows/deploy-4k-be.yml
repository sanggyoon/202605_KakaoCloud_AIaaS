name: Deploy 4K Cinema BE

on:
  push:
    branches:
      - main
    paths:
      - '4K_BE/**'
      - '.github/workflows/deploy-4k-be.yml'

env:
  IMAGE: ghcr.io/sanggyoon/4k-be

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./4K_BE
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in kustomization.yaml
        run: |
          sed -i 's|newTag:.*|newTag: "${{ steps.vars.outputs.sha }}"|' \
            Ansible/manifests/4k-be/kustomization.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ansible/manifests/4k-be/kustomization.yaml
          git commit -m "ci: update 4k-be image → ${{ steps.vars.outputs.sha }} [skip ci]"
          git push
