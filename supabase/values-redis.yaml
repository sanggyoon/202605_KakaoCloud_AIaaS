# 단일 master, 복제 없음
architecture: standalone

# 인증
auth:
  enabled: true
  # password는 secret으로 자동 생성됨 (또는 직접 지정)

# Master 설정
master:
  nodeSelector:
    workload: data

  # PV 비활성화 (캐시용)
  persistence:
    enabled: false

  # 리소스 제한
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

# Replica 비활성화 (standalone이라 자동이지만 명시)
replica:
  replicaCount: 0

# 메트릭 (Prometheus 연동용, 나중에 활성화 가능)
metrics:
  enabled: false
